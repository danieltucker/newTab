services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: newtab
      POSTGRES_USER: newtab
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newtab -d newtab"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: ./server
    environment:
      DATABASE_URL: postgresql://newtab:${POSTGRES_PASSWORD}@postgres:5432/newtab
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?Set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost}
      PORT: 3001
      NODE_ENV: production
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # One proxy hop in this stack (the client nginx) — lets rate limiting see real client IPs.
      TRUST_PROXY: ${TRUST_PROXY:-1}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: ./client
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
